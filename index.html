<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Astro Camera</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link href="./style.css" rel="stylesheet" />
    <script type="module" src="./main.js"></script>
  </head>
  <body>
    <div class="container">
      <div class="left-panel">
        <div class="panel">
          <div class="title">Astro Camera</div>
          <div class="connection-status">
            <div id="status" class="status-indicator"></div>
            <div id="cameraName">Not connected</div>
          </div>
          <button id="connectBtn">Connect to Camera</button>
          <button style="margin-top: 1rem" id="previewBtn" disabled>
            Toggle Preview
          </button>
        </div>

        <div id="actions" style="display: none" class="panel settings">
          <label for="imgFormat">Image Format</label>
          <select id="imgFormat"></select>

          <label for="iso">ISO</label>
          <select id="iso"></select>

          <label for="aperture">Aperture</label>
          <select id="aperture"></select>

          <label for="shutterSpeed">Shutter Speed</label>
          <select id="shutterSpeed"></select>

          <label for="numShots">Number of shots</label>
          <input type="number" id="numShots" value="30" />

          <label for="nameNumber">Start file naming with number</label>
          <input type="number" id="nameNumber" value="1" />

          <div class="fits-container">
            <div class="checkbox-container">
              <input type="checkbox" id="fits" checked />
            </div>
            <p>Convert to FITS (adds ~2 minutes between shots)</p>
          </div>
          <button id="takeShotsBtn" disabled>Take Shots</button>
        </div>
      </div>

      <div id="logs-panel" class="logs">
        <h2>Logs</h2>
        <p>Astro Camera by @thiagonespereira</p>
        <p>https://github.com/thiagonespereira/astro-camera</p>
        <p></p>
      </div>
      <div id="preview-panel" class="panel preview" style="display: none">
        <div class="title">Preview</div>
        <div class="img-container">
          <img id="previewImg" />
          <div class="img-overlay"></div>
        </div>
        <button id="centerZoomBtn">Center Zoom</button>
      </div>
    </div>
    <div class="zoom-container" id="zoom-container" style="display: none;">
      <div class="zoom-pannel">
        <div class="img-container-zoom">
          <img id="zoomImg" />
          <div class="img-overlay"></div>
        </div>
        <button id="closeZoomBtn">Close</button>
      </div>
    </div>
  </body>
</html>
